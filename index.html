<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In | Kanban Boards</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="landing-body">
    <main class="landing-wrap">
      <section class="landing-card">
        <div class="landing-copy">
          <p class="landing-kicker">Welcome back</p>
          <h1>Sign in to your board workspace</h1>
          <p>
            Track your lists and tasks with your Trello-like workflow. Your data stays in this browser.
          </p>
        </div>
        <form id="authForm" class="landing-form">
          <div class="auth-switch">
            <button type="button" id="signInModeBtn" class="ghost-btn full auth-mode active">Sign In</button>
            <button type="button" id="createModeBtn" class="ghost-btn full auth-mode">Create Account</button>
          </div>
          <label>
            Email
            <input id="emailInput" type="email" placeholder="you@example.com" required />
          </label>
          <label>
            Password
            <input id="passwordInput" type="password" placeholder="Enter password" minlength="4" required />
          </label>
          <label id="confirmPasswordWrap" class="hidden">
            Confirm Password
            <input id="confirmPasswordInput" type="password" placeholder="Confirm password" minlength="4" />
          </label>
          <div id="authError" class="landing-error hidden"></div>
          <button id="submitAuthBtn" type="submit" class="primary-btn full">Sign In</button>
          <p id="authNote" class="landing-note">No account? Switch to Create Account.</p>
          <button type="button" id="forgotBtn" class="link-btn">Forgot password?</button>
          <div id="resetPanel" class="reset-panel hidden">
            <label>
              New Password
              <input id="resetPasswordInput" type="password" placeholder="New password" minlength="4" />
            </label>
            <label>
              Confirm New Password
              <input id="resetConfirmPasswordInput" type="password" placeholder="Confirm new password" minlength="4" />
            </label>
            <button id="resetSubmitBtn" type="button" class="ghost-btn full">Reset Password</button>
          </div>
        </form>
      </section>
    </main>
    <script src="./landing.js"></script>
  </body>
</html>
