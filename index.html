<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In | Kanban Boards</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="landing-body">
    <main class="landing-wrap">
      <section class="landing-card">
        <div class="landing-copy">
          <p class="landing-kicker">Welcome back</p>
          <h1>Sign in to your board workspace</h1>
          <p>
            Track your lists and tasks with your Trello-like workflow. Your data stays in this browser.
          </p>
        </div>
        <form id="signInForm" class="landing-form">
          <label>
            Email
            <input id="emailInput" type="email" placeholder="you@example.com" required />
          </label>
          <label>
            Password
            <input id="passwordInput" type="password" placeholder="Enter password" minlength="4" required />
          </label>
          <div id="signInError" class="landing-error hidden">Please enter a valid email and password.</div>
          <button type="submit" class="primary-btn full">Sign In</button>
          <p class="landing-note">Demo mode: any valid email + password works.</p>
        </form>
      </section>
    </main>
    <script src="./landing.js"></script>
  </body>
</html>
